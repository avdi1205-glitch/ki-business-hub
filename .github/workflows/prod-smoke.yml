name: Production Smoke Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production smoke check
        id: smoke_check
        env:
          PROD_BASE_URL: https://ki-business-hub.vercel.app
        run: npm run check:prod

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Production smoke monitor failed';
            const body = [
              'Automatischer Smoke-Check ist fehlgeschlagen.',
              '',
              `Workflow: ${context.workflow}`,
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Zeit: ${new Date().toISOString()}`,
              '',
              'Bitte Logs pruefen und Incident-Check starten.'
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Close failure issue after recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Production smoke monitor failed';
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title);
            if (!existing) {
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: `Recovery bestaetigt im Run https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });
