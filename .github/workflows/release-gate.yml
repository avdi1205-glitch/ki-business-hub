name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci --no-audit --no-progress; then
              exit 0
            fi
            echo "npm ci failed on attempt ${attempt}."
            if [ "${attempt}" -lt 3 ]; then
              echo "Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "npm ci failed after 3 attempts."
          exit 1

      - name: Lint
        run: npm run lint

      - name: E2E
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Production smoke
        env:
          PROD_BASE_URL: https://ki-business-hub.vercel.app
        run: npm run check:prod
