name: Release Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: E2E
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Production smoke
        env:
          PROD_BASE_URL: https://ki-business-hub.vercel.app
        run: npm run check:prod
